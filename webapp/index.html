<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bologna Parking</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #1a1a2e;
      color: #eee;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 12px 16px;
      background: #16213e;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,.4);
      z-index: 1000;
    }

    header h1 {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: .5px;
    }

    #status {
      font-size: .75rem;
      color: #aaa;
    }

    #map {
      flex: 1;
    }

    /* Legend */
    .legend {
      background: rgba(22, 33, 62, .92);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: .75rem;
      line-height: 1.8;
      box-shadow: 0 2px 8px rgba(0,0,0,.4);
      color: #eee;
    }

    .legend-dot {
      display: inline-block;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
    }

    /* Custom marker dots */
    .marker-dot {
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,.7);
      box-shadow: 0 2px 6px rgba(0,0,0,.5);
    }

    /* Popup */
    .leaflet-popup-content-wrapper {
      background: #16213e;
      color: #eee;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,.1);
    }
    .leaflet-popup-tip { background: #16213e; }
    .leaflet-popup-content { margin: 10px 14px; }

    .popup-name {
      font-weight: 700;
      font-size: .95rem;
      margin-bottom: 4px;
    }
    .popup-row {
      font-size: .82rem;
      color: #ccc;
      line-height: 1.6;
    }
    .popup-badge {
      display: inline-block;
      padding: 1px 8px;
      border-radius: 20px;
      font-size: .75rem;
      font-weight: 600;
      margin-top: 6px;
    }
  </style>
</head>
<body>

<header>
  <h1>🅿 Bologna Parking</h1>
  <span id="status">Caricamento…</span>
</header>

<!-- Banner errore visibile -->
<div id="error-banner" style="
  display:none; background:#b71c1c; color:#fff;
  padding:8px 16px; font-size:.85rem; text-align:center;
  position:fixed; top:48px; left:0; right:0; z-index:9999;
"></div>

<div id="map"></div>

<script>
  // ── Mappa centrata su Bologna ──────────────────────────────────────────
  const map = L.map("map", {
    center: [44.4938, 11.3427],
    zoom: 14,
    zoomControl: true
  });

  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
    maxZoom: 19
  }).addTo(map);

  // ── Legenda ────────────────────────────────────────────────────────────
  const legend = L.control({ position: "bottomright" });
  legend.onAdd = () => {
    const div = L.DomUtil.create("div", "legend");
    div.innerHTML = `
      <strong>Scambiatori</strong> (cerchio)<br>
      <span class="legend-dot" style="background:#4caf50"></span>&lt; 50% — libero<br>
      <span class="legend-dot" style="background:#ff9800"></span>50–80% — medio<br>
      <span class="legend-dot" style="background:#f44336"></span>&gt; 80% — pieno<br>
      <hr style="border-color:#444;margin:4px 0">
      <strong>Zone città</strong> (quadrato)<br>
      <span class="legend-dot" style="background:#42a5f5;border-radius:2px"></span>strisce blu<br>
      <span class="legend-dot" style="background:#b0bec5;border-radius:2px"></span>strisce bianche<br>
      <span class="legend-dot" style="background:#ab47bc;border-radius:2px"></span>struttura/raso
    `;
    return div;
  };
  legend.addTo(map);

  // ── Utility: colore in base all'occupazione ────────────────────────────
  function colorByOccupancy(occupato, totale) {
    if (!totale || totale === 0) return "#9e9e9e";
    const pct = occupato / totale;
    if (pct < 0.5)  return "#4caf50"; // verde
    if (pct < 0.8)  return "#ff9800"; // arancio
    return "#f44336";                  // rosso
  }

  function labelByOccupancy(occupato, totale) {
    if (!totale || totale === 0) return { text: "N/D", bg: "#9e9e9e" };
    const pct = occupato / totale;
    if (pct < 0.5)  return { text: "Libero",  bg: "#4caf50" };
    if (pct < 0.8)  return { text: "Medio",   bg: "#ff9800" };
    return                  { text: "Pieno",   bg: "#f44336" };
  }

  // ── Layer groups ──────────────────────────────────────────────────────
  const markersLayer = L.layerGroup().addTo(map);  // scambiatori (cerchi)
  const zoneLayer    = L.layerGroup().addTo(map);  // zone città (quadrati)
  let firstLoad = true;

  // ── Colore marker zona ─────────────────────────────────────────────────
  function colorByTipo(tipo) {
    if (!tipo) return "#78909c";
    if (tipo === "strisce_blu")     return "#42a5f5";
    if (tipo === "strisce_bianche") return "#b0bec5";
    return "#ab47bc"; // struttura / raso / altro
  }

  // ── Fetch dati e piazza marker ─────────────────────────────────────────
  async function caricaParcheggi() {
    const statusEl = document.getElementById("status");

    const errorBanner = document.getElementById("error-banner");
    errorBanner.style.display = "none";

    try {
      const res = await fetch("http://localhost:8000/parcheggi/disponibilita");
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();

      console.log("[Bologna Parking] dati ricevuti:", data);

      // Supporta sia array diretto che { parcheggi: [...] }
      const lista = Array.isArray(data) ? data : (data.parcheggi ?? []);

      if (lista.length === 0) {
        statusEl.textContent = "Nessun parcheggio trovato";
        return;
      }

      markersLayer.clearLayers();
      const bounds = [];

      lista.forEach(p => {
        // Il backend restituisce coordinate come oggetto annidato: { lat, lon }
        // e il campo occupati si chiama posti_occupati
        const lat  = p.coordinate?.lat  ?? p.lat  ?? p.latitude;
        const lon  = p.coordinate?.lon  ?? p.lon  ?? p.lng ?? p.longitude;
        const nome = p.nome ?? p.name ?? "Parcheggio";
        const totale   = p.posti_totali  ?? p.total    ?? p.capacity ?? 0;
        const occupati = p.posti_occupati ?? p.occupati ?? p.occupied ?? (totale - (p.posti_liberi ?? 0));
        const liberi   = p.posti_liberi  ?? p.free     ?? (totale - occupati);

        console.log(`  ${nome}: lat=${lat} lon=${lon} liberi=${liberi}/${totale}`);

        if (lat == null || lon == null) return; // skip se mancano coordinate

        const color = colorByOccupancy(occupati, totale);
        const badge = labelByOccupancy(occupati, totale);

        const icon = L.divIcon({
          className: "",
          html: `<div class="marker-dot" style="width:20px;height:20px;background:${color}"></div>`,
          iconSize:   [20, 20],
          iconAnchor: [10, 10],
          popupAnchor:[0, -14]
        });

        const marker = L.marker([lat, lon], { icon });
        marker.bindPopup(`
          <div class="popup-name">${nome}</div>
          <div class="popup-row">
            Posti liberi: <strong>${liberi}</strong> / ${totale}<br>
            Occupazione: <strong>${totale ? Math.round(occupati/totale*100) : "—"}%</strong>
          </div>
          <span class="popup-badge" style="background:${badge.bg}">${badge.text}</span>
        `);
        markersLayer.addLayer(marker);
        bounds.push([lat, lon]);
      });

      // Al primo caricamento adatta la vista a tutti i marker
      if (firstLoad && bounds.length > 0) {
        map.fitBounds(bounds, { padding: [40, 40], maxZoom: 16 });
        firstLoad = false;
      }

      statusEl.textContent = `${lista.length} parcheggi — ${new Date().toLocaleTimeString("it-IT")}`;

    } catch (err) {
      console.error("[Bologna Parking] fetch fallita:", err);
      statusEl.textContent = "Errore fetch";
      errorBanner.textContent = `Errore: ${err.message} — controlla che il backend sia attivo su localhost:8000`;
      errorBanner.style.display = "block";

      // ── Dati di demo se il backend non è raggiungibile ─────────────────
      const demo = [
        { nome: "Parcheggio Saragozza",      lat: 44.4920, lon: 11.3250, posti_totali: 120, occupati: 40  },
        { nome: "Parcheggio Murri",           lat: 44.4870, lon: 11.3560, posti_totali: 80,  occupati: 65  },
        { nome: "Parcheggio Sant'Orsola",     lat: 44.4890, lon: 11.3630, posti_totali: 200, occupati: 175 },
        { nome: "Parcheggio Malpighi",        lat: 44.4960, lon: 11.3390, posti_totali: 60,  occupati: 10  },
        { nome: "Parcheggio Via Aurelio Saffi",lat: 44.4945, lon: 11.3310, posti_totali: 90, occupati: 72  },
      ];

      demo.forEach(p => {
        const color = colorByOccupancy(p.occupati, p.posti_totali);
        const badge = labelByOccupancy(p.occupati, p.posti_totali);
        const liberi = p.posti_totali - p.occupati;

        const icon = L.divIcon({
          className: "",
          html: `<div class="marker-dot" style="width:20px;height:20px;background:${color}"></div>`,
          iconSize: [20,20], iconAnchor: [10,10], popupAnchor: [0,-14]
        });

        L.marker([p.lat, p.lon], { icon })
          .addTo(map)
          .bindPopup(`
            <div class="popup-name">${p.nome} <em style="font-size:.7rem;color:#aaa">(demo)</em></div>
            <div class="popup-row">
              Posti liberi: <strong>${liberi}</strong> / ${p.posti_totali}<br>
              Occupazione: <strong>${Math.round(p.occupati/p.posti_totali*100)}%</strong>
            </div>
            <span class="popup-badge" style="background:${badge.bg}">${badge.text}</span>
          `);
      });

      statusEl.textContent = "Demo — backend non raggiungibile";
    }
  }

  // ── Fetch zone città (marker quadrati) ────────────────────────────────
  async function caricaZone() {
    try {
      const res = await fetch("http://localhost:8000/parcheggi/zone");
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const lista = await res.json();

      console.log("[Bologna Parking] zone ricevute:", lista.length);

      zoneLayer.clearLayers();
      const bounds = [];

      lista.forEach(p => {
        const lat  = p.coordinate?.lat;
        const lon  = p.coordinate?.lon;
        if (lat == null || lon == null) return;

        const color = colorByTipo(p.tipo);
        const tipoLabel = (p.tipo ?? "N/D").replace("_", " ");

        const icon = L.divIcon({
          className: "",
          html: `<div style="
            width:14px; height:14px;
            background:${color};
            border:2px solid rgba(255,255,255,.7);
            border-radius:2px;
            box-shadow:0 2px 5px rgba(0,0,0,.5);
          "></div>`,
          iconSize:    [14, 14],
          iconAnchor:  [7, 7],
          popupAnchor: [0, -10]
        });

        const rows = [
          `Tipo: <strong>${tipoLabel}</strong>`,
          p.tariffa  ? `Tariffa: <strong>${p.tariffa}</strong>`    : null,
          p.zona     ? `Zona: <strong>${p.zona}</strong>`           : null,
          p.posti_totali ? `Posti: <strong>${p.posti_totali}</strong>` : null,
        ].filter(Boolean).join("<br>");

        L.marker([lat, lon], { icon })
          .bindPopup(`<div class="popup-name">${p.nome}</div><div class="popup-row">${rows}</div>`)
          .addTo(zoneLayer);

        bounds.push([lat, lon]);
      });

      // fitBounds solo se gli scambiatori non hanno già mosso la vista
      if (firstLoad && bounds.length > 0) {
        map.fitBounds(bounds, { padding: [40, 40], maxZoom: 15 });
        firstLoad = false;
      }

    } catch (err) {
      console.warn("[Bologna Parking] zone non disponibili:", err.message);
    }
  }

  caricaParcheggi();
  caricaZone();

  // Aggiorna ogni 60 secondi
  setInterval(caricaParcheggi, 60_000);
</script>
</body>
</html>
